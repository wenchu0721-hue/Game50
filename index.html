<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>三年級成語大冒險－個人挑戰版</title>
<style>
    body{font-family:Microsoft JhengHei;text-align:center;background:#f0f7ff;margin:0;padding:20px;position:relative;min-height:90vh}
    h1{font-size:28px;color:#2c3e50;margin-top:40px}
    
    .btn-pause {
        position: absolute;
        top: 10px;
        right: 10px;
        font-size: 16px;
        padding: 8px 15px;
        background: #f39c12;
        color: white;
        z-index: 100;
        border: none;
        border-radius: 8px;
        cursor: pointer;
    }

    .score-board{font-size:20px;background:#fff;display:inline-block;padding:10px 20px;border-radius:15px;box-shadow:0 2px 5px rgba(0,0,0,0.1);margin-bottom:20px}
    #timer{font-size:24px;color:#e74c3c;font-weight:bold;margin:10px}
    #progress{color:#7f8c8d;margin-bottom:10px}
    .idiom{font-size:50px;letter-spacing:10px;margin:20px 0;font-weight:bold;min-height:70px}
    #full-answer{font-size:35px;color:#27ae60;margin:10px;height:45px;font-weight:bold}
    input{font-size:32px;width:70px;text-align:center;border:2px solid #3498db;border-radius:10px;padding:5px}
    button{font-size:20px;padding:10px 25px;margin:15px 5px;border:none;border-radius:8px;cursor:pointer;transition:0.3s}
    .btn-submit{background:#3498db;color:white}
    .btn-next{background:#2ecc71;color:white;display:none}
    button:disabled{background:#bdc3c7}
    #result{font-size:22px;margin:15px;font-weight:bold;min-height:30px}
</style>
</head>

<body>

<button id="pauseBtn" class="btn-pause" onclick="togglePause()">暫停</button>

<h1>🏆 成語大冒險</h1>

<div class="score-board">
    目前得分：<span id="score">0</span>
</div>

<div id="progress">載入中...</div>
<div id="timer">剩餘時間：12 秒</div>

<div class="idiom" id="idiom"></div>
<div id="full-answer"></div>

<div id="input-area">
    <input id="answer" maxlength="1" placeholder="填" autocomplete="off">
    <br>
    <button id="submitBtn" class="btn-submit" onclick="check()">提交答案 (Enter)</button>
    <button id="nextBtn" class="btn-next" onclick="nextQuestion()">下一題 (Enter)</button>
</div>

<div id="result"></div>

<script>
// 更新後的題庫資料 (共 50 題)
let questions = [
    {"q": "一□驚人", "a": "鳴"}, {"q": "口蜜□劍", "a": "腹"}, {"q": "一事無□", "a": "成"}, {"q": "海不揚□", "a": "波"}, {"q": "破□沉舟", "a": "釜"},
    {"q": "木人□心", "a": "石"}, {"q": "一□千金", "a": "諾"}, {"q": "出奇□勝", "a": "致"}, {"q": "東□事發", "a": "窗"}, {"q": "防患未□", "a": "然"},
    {"q": "自慚形□", "a": "穢"}, {"q": "老生□談", "a": "常"}, {"q": "明珠□投", "a": "暗"}, {"q": "一□千鈞", "a": "髮"}, {"q": "上行下□", "a": "效"},
    {"q": "高□無憂", "a": "枕"}, {"q": "城下之□", "a": "盟"}, {"q": "完□歸趙", "a": "璧"}, {"q": "司空見□", "a": "慣"}, {"q": "置之度□", "a": "外"},
    {"q": "袖手□觀", "a": "旁"}, {"q": "□肉補瘡", "a": "剜"}, {"q": "世外□源", "a": "桃"}, {"q": "瓜田□下", "a": "李"}, {"q": "低聲下□", "a": "氣"},
    {"q": "心腹之□", "a": "患"}, {"q": "天涯海□", "a": "角"}, {"q": "沉魚□雁", "a": "落"}, {"q": "作法自□", "a": "斃"}, {"q": "幸□樂禍", "a": "災"},
    {"q": "披□戴月", "a": "星"}, {"q": "月下老□", "a": "人"}, {"q": "拋□引玉", "a": "磚"}, {"q": "反求諸□", "a": "己"}, {"q": "強詞奪□", "a": "理"},
    {"q": "一衣□水", "a": "帶"}, {"q": "枯魚之□", "a": "肆"}, {"q": "樂此不□", "a": "疲"}, {"q": "兩敗俱□", "a": "傷"}, {"q": "不□下問", "a": "恥"},
    {"q": "孤注一□", "a": "擲"}, {"q": "休□相關", "a": "戚"}, {"q": "道聽□說", "a": "塗"}, {"q": "方寸已□", "a": "亂"}, {"q": "東床□腹", "a": "坦"},
    {"q": "死灰□燃", "a": "復"}, {"q": "一□不通", "a": "竅"}, {"q": "水落石□", "a": "出"}, {"q": "先發□人", "a": "制"}, {"q": "大公無□", "a": "私"}
];

// 打亂題目順序
questions = questions.sort(()=>Math.random()-0.5);

let index = 0;
let score = 0;
let timeLeft = 12;
let timerInterval = null;
let isPaused = false;
let state = "PLAYING";

const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playSound(type) {
    const oscillator = audioCtx.createOscillator();
    const gainNode = audioCtx.createGain();
    oscillator.connect(gainNode);
    gainNode.connect(audioCtx.destination);
    if (type === 'correct') {
        oscillator.frequency.setValueAtTime(800, audioCtx.currentTime);
        oscillator.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.1);
        gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
        oscillator.start();
        oscillator.stop(audioCtx.currentTime + 0.3);
    } else {
        oscillator.frequency.setValueAtTime(200, audioCtx.currentTime);
        gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gainNode.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.5);
        oscillator.start();
        oscillator.stop(audioCtx.currentTime + 0.5);
    }
}

document.addEventListener('keydown', function(event) {
    if (event.key === 'Enter') {
        if (state === "PLAYING") {
            check();
        } else if (state === "SHOWING_RESULT") {
            nextQuestion();
        }
    }
});

function updateDisplay() {
    state = "PLAYING";
    isPaused = false;
    document.getElementById("pauseBtn").innerHTML = "暫停";
    document.getElementById("progress").innerHTML = "題目 " + (index + 1) + " / " + questions.length;
    document.getElementById("idiom").innerHTML = questions[index].q;
    document.getElementById("full-answer").innerHTML = "";
    document.getElementById("answer").value = "";
    document.getElementById("answer").disabled = false;
    document.getElementById("answer").focus();
    document.getElementById("result").innerHTML = "";
    document.getElementById("submitBtn").style.display = "inline-block";
    document.getElementById("pauseBtn").style.display = "inline-block";
    document.getElementById("nextBtn").style.display = "none";
    
    timeLeft = 12;
    document.getElementById("timer").innerHTML = "剩餘時間：12 秒";
    startTimer();
}

function startTimer() {
    clearInterval(timerInterval);
    timerInterval = setInterval(() => {
        if (!isPaused) {
            timeLeft--;
            document.getElementById("timer").innerHTML = "剩餘時間：" + timeLeft + " 秒";
            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                timeUp();
            }
        }
    }, 1000);
}

function togglePause() {
    isPaused = !isPaused;
    const btn = document.getElementById("pauseBtn");
    const input = document.getElementById("answer");
    if (isPaused) {
        btn.innerHTML = "繼續";
        btn.style.background = "#27ae60";
        input.disabled = true;
    } else {
        btn.innerHTML = "暫停";
        btn.style.background = "#f39c12";
        input.disabled = false;
        input.focus();
    }
}

function timeUp() {
    playSound('wrong');
    document.getElementById("result").innerHTML = "⏰ 時間到！";
    finishTurn();
}

function check() {
    if (state !== "PLAYING") return;
    clearInterval(timerInterval);
    let userAns = document.getElementById("answer").value.trim();
    let correctAns = questions[index].a;

    if (userAns === correctAns) {
        playSound('correct');
        document.getElementById("result").innerHTML = "✔ 答對了！";
        document.getElementById("result").style.color = "#27ae60";
        score++;
        document.getElementById("score").innerHTML = score;
    } else {
        playSound('wrong');
        document.getElementById("result").innerHTML = "❌ 答錯了！";
        document.getElementById("result").style.color = "#e74c3c";
    }
    finishTurn();
}

function finishTurn() {
    state = "SHOWING_RESULT";
    let full = questions[index].q.replace("□", questions[index].a);
    document.getElementById("full-answer").innerHTML = full;
    document.getElementById("answer").disabled = true;
    document.getElementById("submitBtn").style.display = "none";
    document.getElementById("pauseBtn").style.display = "none";
    document.getElementById("nextBtn").style.display = "inline-block";
}

function nextQuestion() {
    index++;
    if (index >= questions.length) {
        endGame();
    } else {
        updateDisplay();
    }
}

function endGame() {
    document.body.innerHTML = 
        "<div style='margin-top:50px;'>" +
        "<h1>🎉 挑戰結束</h1>" +
        "<h2>你的最終得分：" + score + " / " + questions.length + "</h2>" +
        "<button onclick='location.reload()' style='background:#3498db;color:white;padding:15px 30px;font-size:24px;border:none;border-radius:10px;cursor:pointer;'>再玩一次</button>" +
        "</div>";
}

updateDisplay();
</script>
</body>
</html>
